</head>
<body>

    <header>
        <nav>
            <a href="https://www.example.com"><img src="icons/menu.png" alt="Logo" style="width: 25px; height: auto;"></a>

        </nav>

    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Get the current page from the URL
            let currentPage = window.location.pathname.split("/").pop().replace(".html", "");

            // Handle cases where the user is on the root ("/")
            if (currentPage === "") {
                currentPage = "index";
            }

            // Find the button that matches the current page and add 'active' class
            document.querySelectorAll(".clickbutton").forEach(button => {
                if (button.dataset.page === currentPage) {
                    button.classList.add("active");
                }
            });
        });
    </script>
</body>
